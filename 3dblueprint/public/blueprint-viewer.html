<!--CONNECTS REACT WITH BLUEPRINT3D-->

<!DOCTYPE html>

<html>

<head>
  <title>Blueprint Viewer</title>

  <link href="/blueprint3d/css/bootstrap.css" rel="stylesheet">
  <link href="/blueprint3d/css/example.css" rel="stylesheet">

  <script src="/blueprint3d/js/three.min.js"></script>
  <script src="/blueprint3d/js/blueprint3d.js"></script>
  <script src="/blueprint3d/js/jquery.js"></script>
  <script src="/blueprint3d/js/bootstrap.js"></script>
  <script src="/blueprint3d/js/items.js"></script>
  <script src="/blueprint3d/js/example.js"></script>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
    }

    iframe {
      width: 100vw;
      height: 100vh;
      border: none;
      display: block;
    }
  </style>
</head>

<body>
<script>
  const url = new URL(window.location.href);
  const branchCode = url.searchParams.get("branch");
  const floorNumber = url.searchParams.get("floor");

  if (!branchCode || !floorNumber) {
    document.body.innerHTML = "<h1>Invalid branch or floor</h1>";
    throw new Error("Missing branch or floor");
  }

  const iframe = document.createElement("iframe");
  iframe.src = `/blueprint3d/example/index.html?branch=${branchCode}&floor=${floorNumber}`;
  iframe.style.width = "100vw";
  iframe.style.height = "100vh";
  iframe.style.border = "none";
  document.body.appendChild(iframe);
</script>
</body>

</html>
