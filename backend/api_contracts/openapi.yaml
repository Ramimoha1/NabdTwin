openapi: 3.0.0
info: { title: Insights API, version: 1.0.0 }
paths:
  /api/v1/analytics/branch/{id}/summary:
    get:
      parameters: [{ name: id, in: path, required: true, schema: { type: integer }}]
      responses:
        '200':
          description: Branch KPI summary
          content:
            application/json:
              schema:
                type: object
                properties:
                  branchId: { type: integer }
                  lastUpdated: { type: string, format: date-time }
                  kpis:
                    type: array
                    items:
                      type: object # ඞ
                      properties:
                        code: { type: string }   # e.g., TASK_COMPLETION
                        label: { type: string }
                        value: { type: number }
                        target: { type: number }
                        unit: { type: string }   # %, hrs, count
                        trend: { type: number }  # -1..+1
  /api/v1/analytics/employee/{id}:
    get:
      responses:
        '200':
          description: Employee KPI detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  employeeId: { type: integer }
                  period: { type: string }       # e.g., 2025-10
                  kpis:
                    type: array
                    items:
                      type: object
                      properties:
                        code: { type: string }
                        sparkline: { type: array, items: { type: number } }
